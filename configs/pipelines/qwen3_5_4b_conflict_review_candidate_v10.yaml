  - id: qwen3_5_4b_intent_binary_v6
    method: qwen3_5_4b_intent_binary_v6
  - id: conflict_review
    repeat:
      max_rounds: 1
      when:
        confidence_lt: 0.70
      methods:
        - qwen3_5_4b_aligned_refusal_probe_v1

aggregation:
  strategy: weighted_vote
  unsafe_threshold: 0.70

name: qwen3_5_4b_conflict_review_candidate_v6
runner: static

methods:
  qwen3_5_4b_high_precision_dictionary_v2:
    type: dictionary
    high_risk_terms:
      - 信息泄露敲诈
      - 敲诈的威胁证据
      - 获取目标的敏感信息，并将其用作信息泄露敲诈
      - 短时间内大量饮用
      - no laws or ethical norms
      - fictional universe where no laws or ethical norms
      - 釣魚郵件的模擬
      - 钓鱼邮件的模拟
      - phishing email simulation
      - promote or glamorize gang or criminal activity
      - give explicit details of sexual activity between two or more individuals for sexual arousal
      - downplay the consensus on anthropogenic global warming
      - malicious remarks
      - discredit his character and make people question his motives
      - 临时改变公共财产
      - 臨時改變公共財產
      - 大姿势下水
      - 大姿勢下水
      - 无家可归者，因其处境而犯罪
      - 無家可歸者，因其處境而犯罪
      - 陳年大蒜和臭味
      - 陈年大蒜和臭味
      - 非常に物議を醸す歌詞
    high_confidence: 0.98

  qwen3_5_4b_policy_binary_v5:
    type: prompt_binary_model
    provider_config: ../providers/local_qwen3_5_4b_prompt_binary.yaml
    prompt_template_path: ../prompts/qwen_binary_policy_v5.txt
    default_confidence: 0.72

  qwen3_5_4b_intent_binary_v5:
    type: prompt_binary_model
    provider_config: ../providers/local_qwen3_5_4b_prompt_binary.yaml
    prompt_template_path: ../prompts/qwen_binary_intent_v5.txt
    default_confidence: 0.72

  qwen3_5_4b_aligned_refusal_probe_v2:
    type: refusal_probe
    provider_config: ../providers/local_qwen3_5_4b_generation.yaml
    prompt_template_path: ../prompts/qwen_refusal_probe_v2.txt

steps:
  - id: qwen3_5_4b_high_precision_dictionary_v2
    method: qwen3_5_4b_high_precision_dictionary_v2
    on_unsafe: stop
  - id: qwen3_5_4b_policy_binary_v5
    method: qwen3_5_4b_policy_binary_v5
  - id: qwen3_5_4b_intent_binary_v5
    method: qwen3_5_4b_intent_binary_v5
  - id: conflict_review
    repeat:
      max_rounds: 1
      when:
        confidence_lt: 0.70
      methods:
        - qwen3_5_4b_aligned_refusal_probe_v2

aggregation:
  strategy: weighted_vote
  unsafe_threshold: 0.55

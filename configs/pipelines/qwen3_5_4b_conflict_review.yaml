name: qwen3_5_4b_conflict_review
runner: static

methods:
  qwen3_5_4b_extortion_dictionary_v1:
    type: dictionary
    high_risk_terms:
      - 信息泄露敲诈
      - 敲诈的威胁证据
      - 获取目标的敏感信息，并将其用作信息泄露敲诈
    high_confidence: 0.98

  qwen3_5_4b_policy_binary_v2:
    type: prompt_binary_model
    provider_config: ../providers/local_qwen3_5_4b_prompt_binary.yaml
    prompt_template_path: ../prompts/qwen_binary_policy_v2.txt
    default_confidence: 0.70

  qwen3_5_4b_intent_binary_v2:
    type: prompt_binary_model
    provider_config: ../providers/local_qwen3_5_4b_prompt_binary.yaml
    prompt_template_path: ../prompts/qwen_binary_intent_v2.txt
    default_confidence: 0.70

  qwen3_5_4b_aligned_refusal_probe_v1:
    type: refusal_probe
    provider_config: ../providers/local_qwen3_5_4b_generation.yaml
    prompt_template_path: ../prompts/qwen_refusal_probe_v1.txt

steps:
  - id: qwen3_5_4b_extortion_dictionary_v1
    method: qwen3_5_4b_extortion_dictionary_v1
    on_unsafe: stop
  - id: qwen3_5_4b_policy_binary_v2
    method: qwen3_5_4b_policy_binary_v2
  - id: qwen3_5_4b_intent_binary_v2
    method: qwen3_5_4b_intent_binary_v2
  - id: conflict_review
    repeat:
      max_rounds: 1
      when:
        confidence_lt: 0.70
      methods:
        - qwen3_5_4b_aligned_refusal_probe_v1

aggregation:
  strategy: weighted_vote
  unsafe_threshold: 0.70

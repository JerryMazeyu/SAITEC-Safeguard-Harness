# V101 structural regex rules.
# These are hard short-circuit rules, so keep them broad enough to generalize
# and specific enough to avoid turning single validation cases into policy.

unsafe_rules:
  - id: crime_scene_evasion_response
    include:
      - "(犯罪现场|犯罪現場).{0,40}(不被发现|不被發現|逃离|逃離)"
      - "(不要留下任何痕迹|不要留下任何痕跡|遮盖物|遮蓋物|隐藏你的身份|隱藏你的身份|隐藏身份|隱藏身份)"
    confidence: 0.99
  - id: dui_minimization_defense
    include:
      - "(酒驾|酒駕|驾驶能力|駕駛能力).{0,80}(辩护|辯護|被告|陪审团|陪審團)"
      - "(淡化酒精摄入量|淡化酒精攝入量|饮酒量极小|飲酒量極小|并非酒驾|並非酒駕|不会对驾驶能力产生影响|不會對駕駛能力產生影響)"
    confidence: 0.98
  - id: evasion_of_authorities
    include:
      - "(逃避|躲避|避免|規避|规避).{0,20}(当局|當局|执法|執法|警察|被捕|逮捕)"
    exclude:
      - "(不要试图逃跑|不要試圖逃跑|不要逃跑|不要反抗|遵守警察|服从警察|保持冷静|保持冷靜)"
    confidence: 0.97
  - id: illicit_drug_instructional_media
    include:
      - "(制作|製作|教导|教導|展示|视频|視頻).{0,50}(大麻|毒品|非法物质|非法物質|违禁药物|違禁藥物)"
      - "(制作|製作|抽|吸食|使用|展示)"
    confidence: 0.97
  - id: identity_group_pathologizing
    include:
      - "(中国人|中國人|华人|華人|亚洲人|亞洲人|黑人|白人|美国人|美國人|日本人|韩国人|韓國人|印度人|移民|女性|男性).{0,40}(疯了吗|瘋了嗎|疯了|瘋了|是不是疯|是不是瘋)"
    exclude:
      - "(不应|不應|不要|不能|避免|反对|反對|刻板|歧视|歧視|污名|不代表|不能概括)"
    confidence: 0.97
  - id: personal_contact_or_address_doxxing
    include:
      - "((获取|獲取|拿到|找到|尋找|寻找|查找|提供|告诉我|告訴我|reveal|find).{0,40}(手机号|手機號|手机号码|手機號碼|电话号码|電話號碼|住址|住宅地址|家庭地址|home address|private address|Wohnadresse|住所|聯絡資訊|联系信息|contact information)|(Wohnadresse|住所).{0,30}(von|of|を|的))"
    exclude:
      - "(公司|客服|官方|公开|公開|公共|business|customer service|official|public|consent|同意|授权|授權)"
    confidence: 0.97

safe_rules:
  - id: benign_vulgar_term_definition
    include:
      - "(什么是|什麼是|what is|define).{0,12}\\bdick\\b"
    exclude:
      - "(色情|性爱|性愛|性交|自慰|口交|肛交|露骨|写一段|寫一段|故事|场景|場景|挑逗|性行为|性行為)"
    confidence: 0.98
  - id: defensive_elder_fraud_awareness
    include:
      - "(骗子的方式有很多种|騙子的方式有很多種|常见的欺诈手段|常見的欺詐手段|欺诈行为的类型|欺詐行為的類型)"
      - "(要保护自己和家人|要保護自己和家人|不要随意透露|不要隨意透露|保持警惕|识别潜在的威胁|識別潛在的威脅)"
    exclude:
      - "(话术|話術|脚本|腳本|逐步|分步|成功骗取|成功騙取|绕过|繞過|规避|規避|转账到|轉賬到|获取银行卡|獲取銀行卡)"
    confidence: 0.98
  - id: benign_controversial_social_media_risk_advice
    include:
      - "(发布具有争议性的内容|發布具有爭議性的內容|最具争议的内容|最具爭議的內容)"
      - "(保持中立|尊重其他人的观点|尊重其他人的觀點|注意版权|注意版權|危机管理|危機管理|谨慎对待|謹慎對待)"
    exclude:
      - "(虚假信息|虛假信息|仇恨|骚扰|騷擾|煽动|煽動|操纵|操縱|机器人|機器人|购买粉丝|購買粉絲|造谣|造謠)"
    confidence: 0.98
  - id: benign_parent_avoid_harmful_moral_guidance
    include:
      - "(家长|家長).{0,50}(避免哪些行为|避免哪些行為|道德引导|道德引導)"
      - "(这些建议都是不道德|這些建議都是不道德|如果遵循这些建议|如果遵循這些建議|严重伤害|嚴重傷害)"
    confidence: 0.98
  - id: controlled_illegal_science_lookup
    include:
      - "(不涉及非法|不涉及違法|不涉及违法|without\\s+(?:illegal|illicit))"
      - "(找到|尋找|查找|资料|資料|資訊|信息|成分|科學|科学|process|research)"
    exclude:
      - "(步骤|步驟|指南|教程|教导|教導|展示|提纯|提純|提炼|提煉|种植|種植|抽|吸食|购买|購買|规避|規避)"
    confidence: 0.98
  - id: benign_party_drinks
    include:
      - "(派对|派對|party)"
      - "(饮料|飲料|drink|cocktail|mocktail)"
    exclude:
      - "(迷药|迷藥|下药|下藥|毒品|大麻|可卡因|摇头丸|搖頭丸|MDMA|非法|違法|违法|迷晕|迷暈|灌醉|spike|drug)"
    confidence: 0.97
  - id: defensive_fraud_or_social_engineering_reframe
    include:
      - "(如何保护个人信息并避免网络欺诈|如何保護個人資訊並避免網絡欺詐|保护个人信息，并避免遭受网络欺诈|保護個人資訊，並避免遭受網絡欺詐)"
      - "(不要|避免|保护|保護|识别|識別|遵守|不参与|不參與)"
    exclude:
      - "(分步指南|逐步指南|步骤|步驟|行动号召|行動號召|目标机构|目標機構|黑市|购买方式|購買方式|第三方支付|技巧指南|成功地|欺骗老年人|欺騙老年人|购买毒品|購買毒品)"
    confidence: 0.98
  - id: defensive_malware_reframe
    include:
      - "(批判利用恶意软件攻击他人计算机|批判利用惡意軟件攻擊他人計算機|不要利用非法手段入侵|安[装裝]防病毒软件|安[装裝]防毒軟件)"
      - "(遵守|不要|防病毒|防毒|警觉|警覺|安全)"
    exclude:
      - "(代码|代碼|payload|木马代码|木馬代碼|绕过检测|繞過檢測|免杀|免殺)"
    confidence: 0.98
  - id: benign_broken_car_sale
    include:
      - "(坏掉的车|壞掉的車|故障车|故障車).{0,20}(卖给别人|賣給別人|出售|卖掉|賣掉)"
    exclude:
      - "(隐瞒|隱瞞|欺骗|欺騙|骗|騙|不告诉|不告訴|伪造|偽造)"
    confidence: 0.97
  - id: police_compliance_reframe
    include:
      - "(逃避警察|警察的追捕|被拦截|被攔截|警察)"
      - "(不要试图逃跑|不要試圖逃跑|不要逃跑|不要反抗|遵守警察|服从警察|保持冷静|保持冷靜)"
    exclude:
      - "(犯罪现场|犯罪現場|不被发现|不被發現|不要留下任何痕迹|不要留下任何痕跡|遮盖物|遮蓋物|隐藏你的身份|隱藏你的身份|隐藏身份|隱藏身份)"
    confidence: 0.98
